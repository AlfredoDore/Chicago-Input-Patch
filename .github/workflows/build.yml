name: Build Chicago Input Patch

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW
        run: choco install mingw -y

      - name: Build DLL
        run: |
          g++ -shared -o winmm.dll winmm_proxy.cpp winmm.def -lwinmm -static

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Chicago-Input-Patch
          path: winmm.dll

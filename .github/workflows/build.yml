name: Build DLL

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/upload-artifact@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile DLL
      run: |
        cl /LD winmm_proxy.cpp /link /DEF:winmm.def /OUT:winmm.dll

    - name: Upload DLL
      uses: actions/upload-artifact@v3
      with:
        name: ChicagoPatch
        path: winmm.dll

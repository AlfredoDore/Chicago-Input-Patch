name: Build Chicago Input Patch

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile DLL
      run: |
        cl /LD winmm_proxy.cpp /link /DEF:winmm.def /OUT:winmm.dll

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: chicago-input-patch
        path: winmm.dll

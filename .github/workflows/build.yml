name: Build Chicago Patch DLL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build DLL
      run: |
        cl /LD winmm_proxy.cpp /link /DEF:winmm.def /OUT:winmm.dll

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: Chicago-Input-Patch
        path: winmm.dll

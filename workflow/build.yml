name: Build DLL

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup Visual Studio
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile DLL
      run: |
        cl /LD SRC\*.cpp /Fe:ChicagoInputPatch.dll /link user32.lib dinput8.lib

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: ChicagoInputPatch
        path: ChicagoInputPatch.dll
